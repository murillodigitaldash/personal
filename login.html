<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de Login</title>
  <!-- CSS do Design System do Governo Federal -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@govbr/dsgov/dist/css/dsgov.min.css">
</head>
<body>
  <div class="br-container mt-5" style="max-width: 400px;">
    <div class="br-card p-3">
      <div class="text-center mb-3">
        <h3 class="br-heading">Login</h3>
      </div>
      <form>
        <div class="br-input mb-3">
          <label for="usuario">Usuário</label>
          <input id="usuario" type="text" placeholder="Digite seu usuário"/>
        </div>
        <div class="br-input mb-3">
          <label for="senha">Senha</label>
          <input id="senha" type="password" placeholder="Digite sua senha"/>
        </div>
        <button type="submit" class="br-button primary w-100">Entrar</button>
      </form>
    </div>
  </div>

  <!-- JS do Design System do Governo Federal -->
  <script src="https://cdn.jsdelivr.net/npm/@govbr/dsgov/dist/js/dsgov.min.js"></script>
</body>
</html>
